<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seberapa Cinta Kamu Sama Arum? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFE4F0 0%, #FFD1E8 50%, #FFCCE0 100%);
            color: #333;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .floating-heart {
            position: fixed;
            font-size: 20px;
            opacity: 0.3;
            pointer-events: none;
            animation: float-heart 8s ease-in infinite;
        }

        @keyframes float-heart {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .heart-1 { left: 5%; animation-delay: 0s; }
        .heart-2 { left: 15%; animation-delay: 2s; }
        .heart-3 { left: 25%; animation-delay: 4s; }
        .heart-4 { right: 10%; animation-delay: 1s; }
        .heart-5 { right: 20%; animation-delay: 3s; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(255, 182, 217, 0.3);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .cat-illustration {
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
        }

        h1 {
            color: #E91E63;
            font-size: 32px;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.1);
        }

        .subtitle {
            color: #FF69B4;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .progress-container {
            margin-bottom: 2rem;
        }

        .progress-bar {
            background: #FFE4F0;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 0.8rem;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FF69B4 0%, #E91E63 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #E91E63;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .questions-container {
            display: none;
        }

        .questions-container.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4F0 100%);
            border: 2px solid #FFB6D9;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-number {
            color: #FF69B4;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .question-title {
            color: #E91E63;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .question-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .slider-container {
            margin: 2rem 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #333;
        }

        .slider-value {
            background: linear-gradient(135deg, #FF69B4 0%, #E91E63 100%);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: linear-gradient(to right, #FFD1E8 0%, #FF69B4 50%, #E91E63 100%);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            margin: 1.5rem 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #E91E63;
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 16px rgba(233, 30, 99, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid #E91E63;
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3);
            transition: all 0.2s ease;
        }

        .slider-description {
            display: flex;
            justify-content: space-between;
            margin-top: 0.8rem;
            font-size: 12px;
            color: #999;
        }

        .slider-description span {
            text-align: center;
            flex: 1;
        }

        .buttons-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-next {
            background: linear-gradient(135deg, #FF69B4 0%, #E91E63 100%);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
        }

        .btn-prev {
            background: #FFE4F0;
            color: #E91E63;
            border: 2px solid #E91E63;
        }

        .btn-prev:hover {
            background: #E91E63;
            color: white;
        }

        .btn-restart {
            background: linear-gradient(135deg, #FF69B4 0%, #E91E63 100%);
            color: white;
            font-size: 18px;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
        }

        .result-screen {
            display: none;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        .result-screen.active {
            display: block;
        }

        .result-cat {
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
            animation: cat-bounce 1s ease-in-out infinite;
        }

        @keyframes cat-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .result-text {
            margin: 2rem 0;
        }

        .love-percentage {
            font-size: 72px;
            font-weight: 700;
            color: #E91E63;
            margin: 1rem 0;
            text-shadow: 2px 2px 8px rgba(233, 30, 99, 0.2);
        }

        .love-message {
            font-size: 28px;
            color: #FF69B4;
            margin: 2rem 0;
            font-weight: 700;
            line-height: 1.5;
        }

        .love-description {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin: 2rem 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .love-stats {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4F0 100%);
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem 0;
            border: 2px solid #FFB6D9;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #FFD1E8;
            color: #333;
            font-weight: 500;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            text-align: left;
        }

        .stat-bar-container {
            flex: 1;
            margin: 0 2rem;
            height: 20px;
            background: #FFE4F0;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-bar {
            height: 100%;
            background: linear-gradient(90deg, #FF69B4 0%, #E91E63 100%);
            transition: width 0.8s ease;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #E91E63;
            pointer-events: none;
            animation: confetti-fall 3s ease-in forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #FFD1E8;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: #E91E63;
            width: 30px;
            border-radius: 6px;
        }

        .step-dot.completed {
            background: #FF69B4;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question-title {
                font-size: 18px;
            }

            .love-percentage {
                font-size: 56px;
            }

            .love-message {
                font-size: 22px;
            }

            .cat-illustration,
            .result-cat {
                width: 120px;
                height: 120px;
            }

            .stat-bar-container {
                margin: 0 1rem;
            }
        }

        .emoji-rating {
            display: flex;
            justify-content: space-around;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }

        .emoji-label {
            font-size: 12px;
            color: #999;
            margin-top: 0.3rem;
        }

        .heart-decoration {
            display: inline-block;
            color: #E91E63;
            margin: 0 0.3rem;
            animation: heart-beat 0.6s ease-in-out infinite;
        }

        @keyframes heart-beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="floating-heart heart-1">💕</div>
    <div class="floating-heart heart-2">💗</div>
    <div class="floating-heart heart-3">💖</div>
    <div class="floating-heart heart-4">💝</div>
    <div class="floating-heart heart-5">💞</div>

    <div class="container">
        <div class="header">
            <svg class="cat-illustration" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Cat Body -->
                <ellipse cx="100" cy="130" rx="45" ry="50" fill="#FF8C42"/>
                
                <!-- Cat Head -->
                <circle cx="100" cy="70" r="40" fill="#FF8C42"/>
                
                <!-- Ears -->
                <polygon points="70,30 60,0 80,25" fill="#FF8C42"/>
                <polygon points="130,30 140,0 120,25" fill="#FF8C42"/>
                <polygon points="70,30 65,10 75,28" fill="#FFB380"/>
                <polygon points="130,30 135,10 125,28" fill="#FFB380"/>
                
                <!-- Eyes -->
                <circle cx="85" cy="60" r="6" fill="#333"/>
                <circle cx="115" cy="60" r="6" fill="#333"/>
                <circle cx="87" cy="58" r="2" fill="white"/>
                <circle cx="117" cy="58" r="2" fill="white"/>
                
                <!-- Nose -->
                <path d="M 100 75 L 98 82 L 102 82 Z" fill="#E91E63"/>
                
                <!-- Mouth -->
                <path d="M 100 82 Q 95 90 90 88" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M 100 82 Q 105 90 110 88" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                
                <!-- Whiskers -->
                <line x1="60" y1="70" x2="30" y2="70" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="60" y1="75" x2="30" y2="78" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="70" x2="170" y2="70" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="75" x2="170" y2="78" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                
                <!-- Heart on Chest -->
                <g transform="translate(100, 135)">
                    <path d="M 0,-8 C -8,-14 -15,-10 -15,-2 C -15,8 0,18 0,18 C 0,18 15,8 15,-2 C 15,-10 8,-14 0,-8 Z" fill="#E91E63"/>
                </g>
                
                <!-- Tail -->
                <path d="M 55 160 Q 20 170 25 145" stroke="#FF8C42" stroke-width="8" fill="none" stroke-linecap="round"/>
                
                <!-- Blush -->
                <ellipse cx="55" cy="75" rx="10" ry="6" fill="#FFB6D9" opacity="0.5"/>
                <ellipse cx="145" cy="75" rx="10" ry="6" fill="#FFB6D9" opacity="0.5"/>
            </svg>

            <h1>💕 Seberapa Cinta Kamu Sama Arum? 💕</h1>
            <p class="subtitle">Jawab pertanyaan dengan jujur dan temukan tingkat cintamu <span class="heart-decoration">💖</span></p>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="currentQuestion">Pertanyaan 1</span> dari <span id="totalQuestions">10</span>
            </div>
            <div class="progress-steps" id="progressSteps"></div>
        </div>

        <div class="questions-container" id="questionsContainer">
            <!-- Questions will be generated by JavaScript -->
        </div>

        <div class="result-screen" id="resultScreen">
            <svg class="result-cat" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Cat Body -->
                <ellipse cx="100" cy="130" rx="45" ry="50" fill="#FF8C42"/>
                
                <!-- Cat Head -->
                <circle cx="100" cy="70" r="40" fill="#FF8C42"/>
                
                <!-- Ears -->
                <polygon points="70,30 60,0 80,25" fill="#FF8C42"/>
                <polygon points="130,30 140,0 120,25" fill="#FF8C42"/>
                <polygon points="70,30 65,10 75,28" fill="#FFB380"/>
                <polygon points="130,30 135,10 125,28" fill="#FFB380"/>
                
                <!-- Eyes (happy) -->
                <path d="M 80 58 Q 85 65 90 58" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M 110 58 Q 115 65 120 58" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                
                <!-- Nose -->
                <path d="M 100 75 L 98 82 L 102 82 Z" fill="#E91E63"/>
                
                <!-- Mouth (happy) -->
                <path d="M 100 82 Q 90 95 85 92" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M 100 82 Q 110 95 115 92" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                
                <!-- Whiskers -->
                <line x1="60" y1="70" x2="30" y2="70" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="60" y1="75" x2="30" y2="78" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="70" x2="170" y2="70" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="75" x2="170" y2="78" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                
                <!-- Big Heart on Chest -->
                <g transform="translate(100, 135)">
                    <path d="M 0,-12 C -10,-20 -18,-14 -18,-2 C -18,12 0,26 0,26 C 0,26 18,12 18,-2 C 18,-14 10,-20 0,-12 Z" fill="#E91E63"/>
                </g>
                
                <!-- Tail (happy) -->
                <path d="M 55 160 Q 10 155 15 125" stroke="#FF8C42" stroke-width="8" fill="none" stroke-linecap="round"/>
                
                <!-- Blush (big) -->
                <ellipse cx="50" cy="75" rx="15" ry="10" fill="#FFB6D9" opacity="0.6"/>
                <ellipse cx="150" cy="75" rx="15" ry="10" fill="#FFB6D9" opacity="0.6"/>
            </svg>

            <div class="result-text">
                <div class="love-percentage" id="resultPercentage">-</div>
                <div class="love-message" id="resultMessage">-</div>
                <p class="love-description" id="resultDescription">-</p>
            </div>

            <div class="love-stats">
                <div class="stat-item">
                    <span class="stat-label">Kedalaman Cinta</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="statKedalam" style="width: 0%"></div>
                    </div>
                    <span id="statKedalamPct">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Frekuensi Memikirkan</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="statFrekuensi" style="width: 0%"></div>
                    </div>
                    <span id="statFrekuensiPct">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Komitmen & Loyalitas</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="statKomitmen" style="width: 0%"></div>
                    </div>
                    <span id="statKomitmenPct">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Kepercayaan & Transparansi</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="statKepercayaan" style="width: 0%"></div>
                    </div>
                    <span id="statKepercayaanPct">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Kebahagiaan Bersama</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="statKebahagiaan" style="width: 0%"></div>
                    </div>
                    <span id="statKebahagiaanPct">0%</span>
                </div>
            </div>

            <div class="buttons-group">
                <button class="btn btn-restart" onclick="restartQuiz()">🔄 Ambil Quiz Lagi</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                title: "Seberapa sering kamu memikirkan Arum dalam sehari?",
                description: "Dari pagi bangun hingga tidur, Arum ada di pikiranmu?",
                hint: "Jarang (1) ← → Selalu (10)"
            },
            {
                title: "Seberapa dalam perasaan cinta yang kamu rasakan untuk Arum?",
                description: "Apakah cintamu hanya ringan atau benar-benar dalam? 🌊",
                hint: "Permukaan (1) ← → Sangat Dalam (10)"
            },
            {
                title: "Seberapa banyak kamu rela berkorban untuk kebahagiaan Arum?",
                description: "Kamu rela mengubah rencana demi Arum?",
                hint: "Tidak Rela (1) ← → Sangat Rela (10)"
            },
            {
                title: "Seberapa sering kamu ingin menghabiskan waktu bersama Arum?",
                description: "Kamu pengen selalu bersama atau cukup sesekali?",
                hint: "Jarang (1) ← → Setiap Hari (10)"
            },
            {
                title: "Seberapa kuat komitmen dan janji kamu kepada Arum?",
                description: "Apakah kamu berkomitmen jangka panjang dengan Arum?",
                hint: "Lemah (1) ← → Sangat Kuat (10)"
            },
            {
                title: "Seberapa bahagia Arum membuat hatimu?",
                description: "Apakah kehadiran Arum membuat harimu lebih berwarna?",
                hint: "Tidak Terlalu (1) ← → Sangat Bahagia (10)"
            },
            {
                title: "Seberapa banyak Arum berarti bagi dirimu?",
                description: "Apakah Arum adalah prioritas utama dalam hidupmu?",
                hint: "Kurang Penting (1) ← → Sangat Penting (10)"
            },
            {
                title: "Seberapa setia kamu kepada Arum?",
                description: "Apakah hatimu hanya untuk Arum saja? 💕",
                hint: "Tidak Setia (1) ← → 100% Setia (10)"
            },
            {
                title: "Seberapa dalam kepercayaan kamu pada Arum?",
                description: "Apakah kamu bisa percaya penuh pada Arum?",
                hint: "Ragu (1) ← → Percaya Penuh (10)"
            },
            {
                title: "Seberapa siap kamu untuk masa depan bersama Arum?",
                description: "Apakah kamu membayangkan masa depan bareng Arum?",
                hint: "Tidak Siap (1) ← → Sangat Siap (10)"
            }
        ];

        let currentQuestion = 0;
        let answers = [];
        let totalQuestions = questions.length;

        function initQuiz() {
            // Generate progress steps
            const progressSteps = document.getElementById('progressSteps');
            for (let i = 0; i < totalQuestions; i++) {
                const dot = document.createElement('div');
                dot.className = 'step-dot' + (i === 0 ? ' active' : '');
                dot.id = `step-${i}`;
                progressSteps.appendChild(dot);
            }
            document.getElementById('totalQuestions').textContent = totalQuestions;

            // Generate questions
            const container = document.getElementById('questionsContainer');
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card' + (index === 0 ? ' active' : '');
                card.id = `question-${index}`;
                
                card.innerHTML = `
                    <div class="question-number">Pertanyaan ${index + 1} dari ${totalQuestions}</div>
                    <div class="question-title">${q.title}</div>
                    <div class="question-description">"${q.description}"</div>
                    
                    <div class="slider-container">
                        <div class="slider-label">
                            <span>Pilih Jawaban:</span>
                            <span class="slider-value" id="value-${index}">5</span>
                        </div>
                        <input 
                            type="range" 
                            min="1" 
                            max="10" 
                            value="5"
                            class="question-slider"
                            data-question="${index}"
                            oninput="updateSliderValue(${index}, this.value)"
                        >
                        <div class="slider-description">
                            <span>1 (Paling Rendah)</span>
                            <span>5 (Netral)</span>
                            <span>10 (Paling Tinggi)</span>
                        </div>
                    </div>

                    <div class="buttons-group">
                        ${index > 0 ? `<button class="btn btn-prev" onclick="previousQuestion()">← Sebelumnya</button>` : ''}
                        ${index < totalQuestions - 1 ? `<button class="btn btn-next" onclick="nextQuestion()">Selanjutnya →</button>` : `<button class="btn btn-next" onclick="finishQuiz()">Lihat Hasil 💕</button>`}
                    </div>
                `;
                
                container.appendChild(card);
            });

            document.getElementById('questionsContainer').classList.add('active');
            answers = new Array(totalQuestions).fill(5);
        }

        function updateSliderValue(questionIndex, value) {
            document.getElementById(`value-${questionIndex}`).textContent = value;
            answers[questionIndex] = parseInt(value);
            updateProgressBar();
        }

        function nextQuestion() {
            if (currentQuestion < totalQuestions - 1) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                document.getElementById(`step-${currentQuestion}`).classList.remove('active');
                document.getElementById(`step-${currentQuestion}`).classList.add('completed');
                
                currentQuestion++;
                
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                document.getElementById(`step-${currentQuestion}`).classList.add('active');
                
                document.getElementById('currentQuestion').textContent = currentQuestion + 1;
                updateProgressBar();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                document.getElementById(`step-${currentQuestion}`).classList.remove('active');
                
                currentQuestion--;
                
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                document.getElementById(`step-${currentQuestion}`).classList.add('active');
                document.getElementById(`step-${currentQuestion}`).classList.remove('completed');
                
                document.getElementById('currentQuestion').textContent = currentQuestion + 1;
                updateProgressBar();
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function finishQuiz() {
            let totalScore = answers.reduce((a, b) => a + b, 0);
            let percentage = Math.round((totalScore / (totalQuestions * 10)) * 100);

            // Calculate individual stats
            const stat1 = answers[0]; // Seberapa sering memikirkan
            const stat2 = answers[1]; // Seberapa dalam perasaan
            const stat5 = answers[4]; // Seberapa kuat komitmen
            const stat7 = answers[7]; // Seberapa setia
            const stat8 = answers[8]; // Seberapa dalam kepercayaan

            const avgKedalaman = Math.round(((answers[1] + answers[6]) / 2 / 10) * 100);
            const avgFrekuensi = Math.round(((answers[0] + answers[3]) / 2 / 10) * 100);
            const avgKomitmen = Math.round(((answers[4] + answers[5]) / 2 / 10) * 100);
            const avgKepercayaan = Math.round(((answers[8] + answers[2]) / 2 / 10) * 100);
            const avgKebahagiaan = Math.round((answers[5] / 10) * 100);

            // Generate message based on percentage
            let message = '';
            let description = '';

            if (percentage <= 20) {
                message = "Belum Ada Cinta? 🤔";
                description = "Sepertinya hatimu belum tersentuh oleh Arum. Mungkin kamu perlu lebih mengenal Arum lebih dekat. Setiap cinta dimulai dari satu langkah kecil! 💭";
            } else if (percentage <= 40) {
                message = "Ada Percikan Cinta 🌟";
                description = "Ada sesuatu yang spesial tentang Arum, tapi mungkin masih tertutup oleh keraguan atau takut untuk membuka hati sepenuhnya. Beri waktu untuk perasaan itu tumbuh! 🌱";
            } else if (percentage <= 60) {
                message = "Cinta Sedang 💕";
                description = "Kamu benar-benar peduli pada Arum dan ada perasaan yang tulus. Namun, masih ada ruang untuk memperdalam hubungan dan kepercayaan. Terus tumbuh bersama! 🌻";
            } else if (percentage <= 80) {
                message = "Cinta yang Mendalam 💖";
                description = "Kamu benar-benar mencintai Arum dengan sepenuh hati! Perasaanmu dalam dan komitmenmu kuat. Arum beruntung memilikimu, dan semoga hubungan kalian terus berkembang! 🌹";
            } else {
                message = "Cinta Sejati 💕🔥";
                description = "Wah! Kamu mencintai Arum dengan sepenuh jiwa dan raga! Cintamu adalah cinta yang tulus, setia, dan dalam. Arum adalah segalanya bagimu. Ini adalah cinta sejati yang indah! ✨💫";
            }

            // Update stats
            document.getElementById('statKedalam').style.width = avgKedalaman + '%';
            document.getElementById('statKedalamPct').textContent = avgKedalaman + '%';
            
            document.getElementById('statFrekuensi').style.width = avgFrekuensi + '%';
            document.getElementById('statFrekuensiPct').textContent = avgFrekuensi + '%';
            
            document.getElementById('statKomitmen').style.width = avgKomitmen + '%';
            document.getElementById('statKomitmenPct').textContent = avgKomitmen + '%';
            
            document.getElementById('statKepercayaan').style.width = avgKepercayaan + '%';
            document.getElementById('statKepercayaanPct').textContent = avgKepercayaan + '%';
            
            document.getElementById('statKebahagiaan').style.width = avgKebahagiaan + '%';
            document.getElementById('statKebahagiaanPct').textContent = avgKebahagiaan + '%';

            // Show results
            document.getElementById('questionsContainer').classList.remove('active');
            document.getElementById('resultPercentage').textContent = percentage + '%';
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultDescription').textContent = description;
            document.getElementById('resultScreen').classList.add('active');

            // Confetti animation
            createConfetti();
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.background = ['#E91E63', '#FF69B4', '#FFB6D9'][Math.floor(Math.random() * 3)];
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(totalQuestions).fill(5);
            
            document.getElementById('questionsContainer').classList.add('active');
            document.getElementById('resultScreen').classList.remove('active');
            
            document.querySelectorAll('.question-card').forEach(card => card.classList.remove('active'));
            document.getElementById('question-0').classList.add('active');
            
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                dot.classList.remove('completed');
                if (index === 0) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            
            document.querySelectorAll('.question-slider').forEach(slider => {
                slider.value = 5;
            });
            
            document.querySelectorAll('.slider-value').forEach(val => {
                val.textContent = '5';
            });
            
            document.getElementById('currentQuestion').textContent = 1;
            document.getElementById('progressFill').style.width = '10%';
        }

        // Initialize
        window.addEventListener('load', initQuiz);
    </script>
</body>
</html>
